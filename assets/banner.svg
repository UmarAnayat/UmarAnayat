<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="460" viewBox="0 0 1500 460" role="img" aria-label="Umar Anayat  Flutter Developer">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0a152b"/>
      <stop offset="45%" stop-color="#091428"/>
      <stop offset="100%" stop-color="#010109"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55AFD2"/>
      <stop offset="100%" stop-color="#7dd3f0"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55AFD2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#55AFD2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#55AFD2" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="460" fill="url(#bg)"/>

  <!-- Soft cyan glow -->
  <circle cx="1180" cy="90" r="220" fill="#55AFD2" opacity="0.10" filter="url(#softGlow)"/>
  <circle cx="1320" cy="380" r="160" fill="#55AFD2" opacity="0.06"/>

  <!-- Subtle grid dots -->
  <g fill="#55AFD2" opacity="0.10">
    <circle cx="80" cy="70" r="2"/><circle cx="130" cy="70" r="2"/><circle cx="180" cy="70" r="2"/><circle cx="230" cy="70" r="2"/>
    <circle cx="80" cy="120" r="2"/><circle cx="130" cy="120" r="2"/><circle cx="180" cy="120" r="2"/><circle cx="230" cy="120" r="2"/>
    <circle cx="80" cy="170" r="2"/><circle cx="130" cy="170" r="2"/><circle cx="180" cy="170" r="2"/><circle cx="230" cy="170" r="2"/>
    <circle cx="80" cy="220" r="2"/><circle cx="130" cy="220" r="2"/><circle cx="180" cy="220" r="2"/><circle cx="230" cy="220" r="2"/>
  </g>

  <!-- Accent line -->
  <rect x="300" y="88" width="360" height="2" fill="url(#line)" rx="1"/>

  <!-- Role pill -->
  <rect x="300" y="110" width="248" height="34" rx="17" fill="rgba(85,175,210,0.14)" stroke="#55AFD2" stroke-opacity="0.45"/>
  <text x="424" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#7dd3f0">MOBILE APP DEVELOPER</text>

  <!-- Name -->
  <text x="300" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-1.5">Umar</text>
  <text x="480" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="900" fill="url(#accent)" letter-spacing="-1.5">Anayat</text>

  <!-- Subtitle -->
  <text x="300" y="268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.72)">Software Developer  ·  Flutter · Cross-platform Apps</text>

  <!-- Skill chips -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
    <rect x="300" y="310" width="92" height="34" rx="10" fill="rgba(85,175,210,0.14)" stroke="#55AFD2" stroke-opacity="0.35"/>
    <text x="346" y="332" text-anchor="middle" fill="#a8e4f5">Flutter</text>

    <rect x="404" y="310" width="72" height="34" rx="10" fill="rgba(85,175,210,0.14)" stroke="#55AFD2" stroke-opacity="0.35"/>
    <text x="440" y="332" text-anchor="middle" fill="#a8e4f5">Dart</text>

    <rect x="488" y="310" width="128" height="34" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="552" y="332" text-anchor="middle" fill="rgba(255,255,255,0.82)">Android &amp; iOS</text>

    <rect x="628" y="310" width="100" height="34" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="678" y="332" text-anchor="middle" fill="rgba(255,255,255,0.82)">Firebase</text>

    <rect x="740" y="310" width="98" height="34" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="789" y="332" text-anchor="middle" fill="rgba(255,255,255,0.82)">REST APIs</text>

    <rect x="850" y="310" width="78" height="34" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="889" y="332" text-anchor="middle" fill="rgba(255,255,255,0.82)">React</text>
  </g>

  <!-- Footer meta -->
  <text x="300" y="390" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.45)">=Í Lahore, Pakistan &nbsp;&nbsp;·&nbsp;&nbsp; < www.umaranayat.com</text>

  <!-- Right decorative phone frame -->
  <g transform="translate(1180,70) rotate(8)">
    <rect x="0" y="0" width="120" height="230" rx="22" fill="rgba(255,255,255,0.03)" stroke="#55AFD2" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="18" y="28" width="84" height="160" rx="10" fill="url(#accent)" opacity="0.85"/>
    <rect x="42" y="12" width="36" height="6" rx="3" fill="rgba(85,175,210,0.35)"/>
    <text x="60" y="118" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a152b" letter-spacing="1">FLUTTER</text>
  </g>
</svg>
